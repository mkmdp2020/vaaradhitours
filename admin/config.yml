backend:
  name: github
  repo: YOUR_GITHUB_USERNAME/vaaradhitours   # ← replace with your GitHub repo
  branch: main
  auth_type: pkce
  app_id: Ov23lijIxDMUw6kDoUTR

media_folder: "images"
public_folder: "/images"

collections:
  - name: "site"
    label: "Site Content"
    files:

      # ── HERO ──────────────────────────────────────────────────────────────
      - name: "hero"
        label: "Hero Section"
        file: "content.json"
        fields:
          - name: hero
            label: Hero
            widget: object
            fields:
              - { name: badge,          label: "Badge Text",       widget: string }
              - { name: title,          label: "Title (line 1)",   widget: string }
              - { name: titleHighlight, label: "Title (highlight)",widget: string }
              - { name: subtitle,       label: "Subtitle",         widget: text   }
              - name: stats
                label: Stats
                widget: list
                fields:
                  - { name: value, label: Value, widget: string }
                  - { name: label, label: Label, widget: string }

          - name: whoFor
            label: Who Is This For
            widget: object
            fields:
              - { name: yes,     label: "✅ IS for you (list)", widget: list, field: { name: item, label: Item, widget: string } }
              - { name: no,      label: "❌ NOT for you (list)",widget: list, field: { name: item, label: Item, widget: string } }
              - { name: promise, label: "🎯 Our Promise (list)", widget: list, field: { name: item, label: Item, widget: string } }

          - name: visa
            label: Visa Section
            widget: object
            fields:
              - { name: intro,      label: Intro Text,     widget: text }
              - { name: alertTitle, label: Alert Title,    widget: string }
              - { name: alertBody,  label: Alert Body,     widget: text }
              - name: cards
                label: Visa Cards
                widget: list
                fields:
                  - { name: type,  label: Type (required/free), widget: select, options: [required, free] }
                  - { name: icon,  label: Icon Emoji,  widget: string }
                  - { name: title, label: Title,       widget: string }
                  - { name: body,  label: Body,        widget: text }
              - { name: warning, label: Warning Text, widget: text }

          - name: itinerary
            label: Itineraries
            widget: object
            fields:
              - name: "8h"
                label: "8-Hour Sprint"
                widget: object
                fields:
                  - { name: note, label: Note, widget: text }
                  - name: steps
                    label: Steps
                    widget: list
                    fields:
                      - { name: time,  label: Time,  widget: string }
                      - { name: icon,  label: Icon,  widget: string }
                      - { name: title, label: Title, widget: string }
                      - { name: body,  label: Body,  widget: text }
                      - { name: tip,   label: Tip (optional), widget: string, required: false }
              - name: "1d"
                label: "1 Full Day"
                widget: object
                fields:
                  - { name: note, label: Note, widget: text }
                  - name: steps
                    label: Steps
                    widget: list
                    fields:
                      - { name: time,  label: Time,  widget: string }
                      - { name: icon,  label: Icon,  widget: string }
                      - { name: title, label: Title, widget: string }
                      - { name: body,  label: Body,  widget: text }
                      - { name: tip,   label: Tip (optional), widget: string, required: false }
              - name: "2d"
                label: "2 Days"
                widget: object
                fields:
                  - { name: note,     label: Note,          widget: text }
                  - { name: day1Note, label: Day 1 Note,    widget: text }
                  - name: steps
                    label: Day 2 Steps
                    widget: list
                    fields:
                      - { name: time,  label: Time/Label, widget: string }
                      - { name: icon,  label: Icon,       widget: string }
                      - { name: title, label: Title,      widget: string }
                      - { name: body,  label: Body,       widget: text }
                      - { name: tip,   label: Tip (optional), widget: string, required: false }

          - name: attractions
            label: Attractions
            widget: list
            fields:
              - { name: emoji,       label: Emoji,     widget: string }
              - { name: bg,          label: BG Color,  widget: string }
              - { name: category,    label: Category,  widget: string }
              - { name: paid,        label: Paid Entry,widget: boolean }
              - { name: name,        label: Name,      widget: string }
              - { name: duration,    label: Duration,  widget: string }
              - { name: cost,        label: Cost,      widget: string }
              - { name: tube,        label: Tube Stop, widget: string }
              - { name: description, label: Description, widget: text }

          - name: transport
            label: Transport
            widget: object
            fields:
              - name: options
                label: Transport Options
                widget: list
                fields:
                  - { name: icon,        label: Icon,        widget: string }
                  - { name: name,        label: Name,        widget: string }
                  - { name: description, label: Description, widget: text }
                  - { name: cost,        label: Cost,        widget: string }
              - name: tips
                label: Transport Tips
                widget: list
                fields:
                  - { name: title, label: Title, widget: string }
                  - { name: body,  label: Body,  widget: text }

          - name: food
            label: Food Areas
            widget: list
            fields:
              - { name: icon, label: Icon,  widget: string }
              - { name: area, label: Area,  widget: string }
              - { name: name, label: Name,  widget: string }
              - { name: body, label: Body,  widget: text }

          - name: essentials
            label: Essentials Cards
            widget: list
            fields:
              - { name: icon,  label: Icon,  widget: string }
              - { name: title, label: Title, widget: string }
              - name: items
                label: List Items
                widget: list
                field: { name: item, label: Item, widget: string }

          - name: tips
            label: Pro Tips
            widget: list
            fields:
              - { name: icon,  label: Icon,  widget: string }
              - { name: title, label: Title, widget: string }
              - { name: body,  label: Body,  widget: text }
